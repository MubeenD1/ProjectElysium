<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Project Elysium — Zenith Systems</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=Inter:wght@300;400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/elysium/style.css"/>
</head>
<body>

  <canvas id="stars"></canvas>

  <div class="orbs" aria-hidden="true">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
    <div class="orb orb4"></div>
    <div class="orb orb5"></div>
    <div class="orb orb6"></div>
  </div>
  <div class="noise" aria-hidden="true"></div>
  <div class="scanline" aria-hidden="true"></div>

  <nav id="nav">
    <a href="/" class="logo">
      <div class="logo-mark">
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <line x1="2.5" y1="2.5" x2="12.5" y2="2.5"/>
          <line x1="12.5" y1="2.5" x2="2.5" y2="12.5"/>
          <line x1="2.5" y1="12.5" x2="12.5" y2="12.5"/>
        </svg>
      </div>
      Zenith Systems
    </a>
    <div class="nav-right">Project Elysium</div>
  </nav>

  <section class="hero">
    <p class="hero-eyebrow" id="eyebrow"></p>
    <h1 class="hero-title">ELYSIUM</h1>
    <p class="hero-tagline" id="tagline"></p>
    <div class="hero-bottom">
      <span class="hero-coord" id="coords"></span>
      <div class="hero-scroll">
        <span>Explore</span>
        <div class="scroll-bar"></div>
      </div>
      <span class="hero-year" id="year"></span>
    </div>
  </section>

  <section class="s-vision section-wrap glass">
    <div class="vision-inner reveal">
      <div class="section-label">01 — Vision</div>
      <p class="vision-text" id="vision"></p>
    </div>
  </section>

  <!-- IMAGE 1: waterfall atrium — full bleed -->
  <div class="img-break reveal">
    <img src="./images/image1.jpg" alt="Elysium concept — integrated nature and architecture"/>
    <div class="img-break-overlay"></div>
    <div class="img-break-caption">Integrated Living Infrastructure — Concept Reference</div>
  </div>

  <section class="s-pillars section-wrap glass">
    <div class="pillars-header reveal">
      <div class="section-label">02 — Foundations</div>
      <span class="pillars-count">03 Core Principles</span>
    </div>
    <div class="pillars-grid" id="pillars"></div>
  </section>

  <!-- IMAGE 2: aerial garden — breathing panel -->
  <div class="img-break reveal">
    <img src="./images/image2.jpg" alt="Elysium concept — aerial urban garden"/>
    <div class="img-break-overlay"></div>
    <div class="img-break-caption">District Planning Model — Overhead View</div>
  </div>

  <section class="s-close section-wrap glass">
    <p class="close-eyebrow reveal">03 — Purpose</p>
    <h2 class="close-title reveal" id="closeHeadline"></h2>
    <p class="close-body reveal" id="closeBody"></p>
  </section>

  <!-- IMAGE 3: walkway dome — closing image -->
  <div class="img-break reveal">
    <img src="./images/image3.jpg" alt="Elysium concept — canopy walkway"/>
    <div class="img-break-overlay"></div>
    <div class="img-break-caption">Canopy Transit Corridor — Phase One</div>
  </div>

  <div class="s-data" id="stats"></div>

  <footer>
    <div class="footer-brand">Zenith Systems</div>
    <ul class="footer-links">
      <li><a href="#">Privacy</a></li>
      <li><a href="#">Contact</a></li>
      <li><a href="#">Careers</a></li>
    </ul>
    <div class="footer-copy" id="footerCopy"></div>
  </footer>

  <script src="/elysium/content.js"></script>
  <script>
    // ── FILL CONTENT ──
    document.getElementById('eyebrow').textContent       = content.eyebrow;
    document.getElementById('tagline').textContent       = content.tagline;
    document.getElementById('coords').textContent        = content.coords;
    document.getElementById('year').textContent          = content.year;
    document.getElementById('vision').textContent        = content.vision;
    document.getElementById('closeHeadline').textContent = content.closeHeadline;
    document.getElementById('closeBody').textContent     = content.closeBody;
    document.getElementById('footerCopy').textContent    = content.footerCopy;

    // Pillars
    document.getElementById('pillars').innerHTML = content.pillars.map((p, i) => `
      <div class="pillar">
        <span class="pillar-num">0${i + 1}</span>
        <h3 class="pillar-title">${p.title}</h3>
        <p class="pillar-body">${p.body}</p>
      </div>
    `).join('');

    // Stats
    document.getElementById('stats').innerHTML = content.stats.map(s => `
      <div class="data-item">
        <div class="data-num"><em>${s.num}</em></div>
        <div class="data-label">${s.label}</div>
      </div>
    `).join('');

    // ── NAV ──
    const nav = document.getElementById('nav');
    window.addEventListener('scroll', () => {
      nav.classList.toggle('scrolled', window.scrollY > 60);
    }, { passive: true });

    // ── STARFIELD ──
    const canvas = document.getElementById('stars');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize, { passive: true });

    const STAR_COUNT = 280;
    const stars = Array.from({ length: STAR_COUNT }, () => ({
      x:      Math.random(),
      y:      Math.random(),
      r:      Math.random() * 1.2 + 0.2,
      phase:  Math.random() * Math.PI * 2,
      speed:  0.0003 + Math.random() * 0.0006,
      bright: 0.4 + Math.random() * 0.6,
    }));

    function drawStars(ts) {
      const W = canvas.width;
      const H = canvas.height;
      ctx.clearRect(0, 0, W, H);
      stars.forEach(s => {
        const flicker = s.bright * (0.55 + 0.45 * Math.sin(ts * s.speed + s.phase));
        ctx.beginPath();
        ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
        const g = s.bright > 0.85 ? 255 : 220;
        ctx.fillStyle = `rgba(200, ${g}, 210, ${flicker})`;
        ctx.fill();
      });
      requestAnimationFrame(drawStars);
    }
    requestAnimationFrame(drawStars);

    // ── SCROLL REVEAL ──
    const io = new IntersectionObserver((entries) => {
      entries.forEach((e, i) => {
        if (e.isIntersecting) {
          setTimeout(() => e.target.classList.add('visible'), i * 110);
          io.unobserve(e.target);
        }
      });
    }, { threshold: 0.1 });
    document.querySelectorAll('.reveal, .pillar, .data-item').forEach(el => io.observe(el));
  </script>
</body>
</html>
